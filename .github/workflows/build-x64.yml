name: Build x64

on:
  push:
    branches: [ "main" ]
    tags: [ '[0-9]*' ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'build_ci.cmd'
      - 'elevenclock/elevenclock.spec'
      - 'ElevenClock.iss'
      - '.github/workflows/build-x64.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'build_ci.cmd'
      - 'elevenclock/elevenclock.spec'
      - 'ElevenClock.iss'
      - '.github/workflows/build-x64.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11 (x64)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Show Python / arch
        shell: pwsh
        run: |
          python -c "import platform, sys; print('python', sys.version); print('machine', platform.machine())"

      - name: Build x64 binaries
        shell: cmd
        run: build_ci.cmd

      - name: Verify Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }

      - name: Build installer (x64)
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /FElevenClock.Installer.x64 ElevenClock.iss'

      - name: Upload ElevenClock x64 binaries
        uses: actions/upload-artifact@v7
        with:
          name: ElevenClock-x64
          path: ElevenClockBin/
          if-no-files-found: error

      - name: Upload x64 installer
        uses: actions/upload-artifact@v7
        with:
          name: ElevenClock.Installer.x64
          path: ElevenClock.Installer.x64.exe
          if-no-files-found: error

      - name: Create or update GitHub Release with x64 installer
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ElevenClock ${{ github.ref_name }}
          generate_release_notes: true
          files: ElevenClock.Installer.x64.exe
