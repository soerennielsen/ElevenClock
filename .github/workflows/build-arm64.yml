name: Build ARM64

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'build_ci.cmd'
      - 'elevenclock/elevenclock.spec'
      - 'ElevenClock.iss'
      - '.github/workflows/build-arm64.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'build_ci.cmd'
      - 'elevenclock/elevenclock.spec'
      - 'ElevenClock.iss'
      - '.github/workflows/build-arm64.yml'
  workflow_dispatch:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-11-arm
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11 (ARM64)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          architecture: 'arm64'

      - name: Show Python / arch
        shell: pwsh
        run: |
          python -c "import platform, sys; print('python', sys.version); print('machine', platform.machine())"

      - name: Build ARM64 binaries
        shell: cmd
        run: build_ci.cmd

      - name: Verify Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }

      - name: Build installer (ARM64)
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /FElevenClock.Installer.arm64 ElevenClock.iss'

      - name: Upload ElevenClock ARM64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: ElevenClock-arm64
          path: ElevenClockBin/
          if-no-files-found: error

      - name: Upload ARM64 installer
        uses: actions/upload-artifact@v4
        with:
          name: ElevenClock.Installer.arm64
          path: ElevenClock.Installer.arm64.exe
          if-no-files-found: error

      - name: Attach ARM64 installer to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ElevenClock.Installer.arm64.exe
